<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#490013",
              "on-primary": "#400084",
              "outline": "#767575",
              "secondary": "#cad6fd",
              "primary-fixed-dim": "#ad77ff",
              "secondary-fixed": "#cad6fd",
              "background": "#0e0e0e",
              "tertiary-dim": "#00e5ee",
              "on-surface-variant": "#adaaaa",
              "surface-container-lowest": "#000000",
              "outline-variant": "#484847",
              "surface-tint": "#c29bff",
              "secondary-fixed-dim": "#bcc8ef",
              "primary": "#c29bff",
              "primary-container": "#b789ff",
              "on-secondary": "#3e4a6a",
              "on-secondary-fixed-variant": "#485474",
              "tertiary-container": "#00f4fe",
              "secondary-dim": "#bcc8ef",
              "primary-dim": "#8f51ea",
              "on-surface": "#ffffff",
              "surface-container-highest": "#262626",
              "on-primary-fixed-variant": "#3d007f",
              "inverse-primary": "#7837d2",
              "surface": "#0e0e0e",
              "inverse-on-surface": "#565555",
              "on-error-container": "#ffb2b9",
              "error-dim": "#d73357",
              "surface-container-high": "#20201f",
              "error": "#ff6e84",
              "tertiary-fixed": "#00f4fe",
              "surface-container-low": "#131313",
              "inverse-surface": "#fcf9f8",
              "on-tertiary": "#006165",
              "secondary-container": "#3a4666",
              "tertiary": "#a1faff",
              "error-container": "#a70138",
              "on-secondary-fixed": "#2b3756",
              "surface-container": "#1a1a1a",
              "tertiary-fixed-dim": "#00e5ee",
              "on-secondary-container": "#c3cff6",
              "on-background": "#ffffff",
              "on-tertiary-fixed": "#004346",
              "surface-variant": "#262626",
              "on-tertiary-fixed-variant": "#006266",
              "primary-fixed": "#b789ff",
              "surface-dim": "#0e0e0e",
              "on-primary-fixed": "#000000",
              "surface-bright": "#2c2c2c",
              "on-tertiary-container": "#00575b",
              "on-primary-container": "#310068"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .road-line {
            background: linear-gradient(to bottom, transparent 0%, #262626 20%, #262626 80%, transparent 100%);
        }
        .glass-panel {
            background: rgba(38, 38, 38, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Top Navigation Anchor (Suppressed for focused task per mandate, but Brand Identity preserved) -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full max-w-none shadow-[0px_20px_40px_rgba(157,89,255,0.08)]">
<div class="flex items-center gap-4">
<span class="text-2xl font-bold tracking-tighter text-[#9D59FF] font-['Space_Grotesk']">LunaSleep</span>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="professional male portrait with soft studio lighting and clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDURdcq7NxU53eOxtA9OelNi29oDBIsaYedmFkBV1ZhTnwHKAuwfHmNMbyEA16IhsNdFls5WBZa8tYP_zOZCCJqiDasT3k3vDa8vCi6Faje2d2zJyBDBiEsywdWcLLGtsQ5hp5OXzFwqjsLcsYHktpxSIeI9Vxx9Zf_O0gurfSkZUCetAEgN352g01CYzecfZ17WFMxHQLFezVsOZw0KJx3Cs-RE4RFwxYcmf0xDPtaveK2JJeFGTkpnejOzIqeiK3hmN543DmSTrY"/>
</div>
</div>
</header>
<main class="relative h-screen w-full flex flex-col items-center justify-center pt-16 pb-24 overflow-hidden">
<!-- Game Canvas Area -->
<div class="relative w-full max-w-md h-full mx-auto bg-surface-container-low overflow-hidden shadow-2xl">
<!-- Moving Road Background -->
<div class="absolute inset-0 flex justify-center gap-32">
<!-- Left Grass/Shoulder -->
<div class="w-4 h-full bg-surface-container-highest opacity-20"></div>
<!-- Road Markings -->
<div class="flex flex-col gap-12 h-[200%] road-animation">
<div class="w-1.5 h-16 bg-outline-variant opacity-30 rounded-full"></div>
<div class="w-1.5 h-16 bg-outline-variant opacity-30 rounded-full"></div>
<div class="w-1.5 h-16 bg-outline-variant opacity-30 rounded-full"></div>
<div class="w-1.5 h-16 bg-outline-variant opacity-30 rounded-full"></div>
<div class="w-1.5 h-16 bg-outline-variant opacity-30 rounded-full"></div>
<div class="w-1.5 h-16 bg-outline-variant opacity-30 rounded-full"></div>
<div class="w-1.5 h-16 bg-outline-variant opacity-30 rounded-full"></div>
</div>
<!-- Right Grass/Shoulder -->
<div class="w-4 h-full bg-surface-container-highest opacity-20"></div>
</div>
<!-- Game HUD (Top) -->
<div class="absolute top-8 inset-x-0 flex flex-col items-center px-8 z-20">
<div class="glass-panel rounded-lg px-6 py-4 w-full flex justify-between items-center border border-outline-variant/10">
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Time Remaining</span>
<span class="font-headline text-3xl font-bold text-primary">00:24</span>
</div>
<div class="flex flex-col items-end">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Points</span>
<span class="font-headline text-3xl font-bold text-tertiary">1,240</span>
</div>
</div>
<div class="mt-6 flex flex-col items-center gap-2">
<p class="text-on-surface text-sm font-medium bg-surface/60 px-4 py-1.5 rounded-full backdrop-blur-md">Keep driving for 30s to dismiss alarm</p>
<div class="w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-[20%]"></div>
</div>
</div>
</div>
<!-- The Car (Top Down View) -->
<div class="absolute bottom-40 left-1/2 -translate-x-1/2 z-30 group">
<div class="relative w-16 h-28">
<!-- Car Body Shadow -->
<div class="absolute inset-0 bg-primary/20 blur-xl scale-125 rounded-xl"></div>
<!-- Car Body -->
<div class="relative w-full h-full bg-gradient-to-b from-primary to-primary-dim rounded-xl shadow-lg flex flex-col items-center p-2">
<!-- Windshield -->
<div class="w-10 h-6 bg-surface-container-highest/80 rounded-md mt-4 backdrop-blur-sm"></div>
<!-- Rear Window -->
<div class="w-10 h-3 bg-surface-container-highest/80 rounded-sm mt-auto mb-2"></div>
<!-- Headlights Glow -->
<div class="absolute -top-4 left-1 w-4 h-12 bg-primary/40 blur-md rounded-full"></div>
<div class="absolute -top-4 right-1 w-4 h-12 bg-primary/40 blur-md rounded-full"></div>
</div>
</div>
</div>
<!-- Speedometer & Controls (Bottom) -->
<div class="absolute bottom-8 inset-x-0 px-8 z-20">
<div class="flex items-center justify-between gap-6">
<!-- Left Control Arrow -->
<button class="w-16 h-16 rounded-full glass-panel flex items-center justify-center text-on-surface active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl" data-icon="arrow_back_ios_new">arrow_back_ios_new</span>
</button>
<!-- Speed Display -->
<div class="flex-1 flex flex-col items-center justify-center">
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Circular Gauge Track -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-surface-container-highest" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-dasharray="364" stroke-dashoffset="140" stroke-width="8"></circle>
</svg>
<div class="flex flex-col items-center">
<span class="font-headline text-4xl font-bold text-on-surface">82</span>
<span class="font-label text-[10px] uppercase text-on-surface-variant">KM/H</span>
</div>
</div>
</div>
<!-- Right Control Arrow -->
<button class="w-16 h-16 rounded-full glass-panel flex items-center justify-center text-on-surface active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
</div>
</div>
<!-- Obstacle (Incoming) -->
<div class="absolute top-40 left-1/4 w-12 h-12 bg-tertiary-dim/20 backdrop-blur-md border border-tertiary/30 rounded-lg flex items-center justify-center z-10">
<span class="material-symbols-outlined text-tertiary text-2xl" data-icon="star">star</span>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Consistent with Shared Components) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#131313]/40 backdrop-blur-2xl rounded-t-[2rem] z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center justify-center text-[#adaaaa] opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Manrope'] text-[10px] tracking-wide uppercase mt-1">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-[#adaaaa] opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="bedtime">bedtime</span>
<span class="font-['Manrope'] text-[10px] tracking-wide uppercase mt-1">Sleep</span>
</div>
<!-- Active Alarm Tab -->
<div class="flex flex-col items-center justify-center text-[#9D59FF] bg-[#262626]/60 rounded-full px-4 py-2 shadow-[0_0_15px_rgba(157,89,255,0.3)] scale-110 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="alarm">alarm</span>
<span class="font-['Manrope'] text-[10px] tracking-wide uppercase mt-1">Alarm</span>
</div>
<div class="flex flex-col items-center justify-center text-[#adaaaa] opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="sports_esports">sports_esports</span>
<span class="font-['Manrope'] text-[10px] tracking-wide uppercase mt-1">Wake</span>
</div>
<div class="flex flex-col items-center justify-center text-[#adaaaa] opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Manrope'] text-[10px] tracking-wide uppercase mt-1">Settings</span>
</div>
</nav>
<!-- Decorative Corner Accents -->
<div class="fixed top-0 left-0 w-64 h-64 bg-primary/5 blur-[120px] rounded-full pointer-events-none -translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 right-0 w-96 h-96 bg-tertiary/5 blur-[150px] rounded-full pointer-events-none translate-x-1/3 translate-y-1/3"></div>
</body></html>
